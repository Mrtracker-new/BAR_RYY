        },

          }
        },
        {
          "@type": "Question",
          "name": "What is Burn Chat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Burn Chat is BAR's ephemeral encrypted chat feature. You create a room with a countdown timer (e.g., 10 minutes). Anyone with the share link can join. When the timer expires, the server broadcasts a destroy event, the session is wiped, and all messages are permanently erased — from both the server and every participant's screen. No chat history is ever stored."
          }
        },
        {
          "@type": "Question",
          "name": "How does Burn Chat's encryption work?",

            "@type": "Answer",
            "text": "Burn Chat uses end-to-end encryption built entirely in the browser. When E2E mode is active, each participant generates an ECDH P-256 key pair. The creator wraps a shared AES-GCM session key with each participant's public key and distributes it via encrypted unicast. All messages are encrypted with AES-GCM in the browser before transmission — the server only relays ciphertext and never has access to plaintext. The session key is destroyed with the session."
          }
        },
        {
          "@type": "Question",
          "name": "Is BAR free to use?",
          "acceptedAnswer": {
